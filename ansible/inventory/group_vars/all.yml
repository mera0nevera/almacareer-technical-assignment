---
# Variables shared across ALL hosts
# Non-sensitive values only – no passwords here.

admin_user: sysadmin

# IPs resolved at run-time from the EC2 dynamic inventory.
# The aws_ec2 plugin composes 'private_ip' from the AWS API for every discovered instance.
# Adding a new web server only requires tagging it Role=web01/web02/web03 – no file edits needed.
haproxy_ip: "{{ hostvars[groups['tag_Role_haproxy'][0]]['private_ip'] }}"
db_ip:      "{{ hostvars[groups['tag_Role_db'][0]]['private_ip'] }}"

# Firewall
firewall_service: firewalld

# NTP / chrony
ntp_pool: "pool.ntp.org iburst"

# SSH hardening
sshd_config:
  PermitRootLogin: "no"
  PasswordAuthentication: "no"
  PubkeyAuthentication: "yes"
  X11Forwarding: "no"
  MaxAuthTries: "3"

