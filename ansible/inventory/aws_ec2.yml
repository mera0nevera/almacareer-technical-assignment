# AWS EC2 dynamic inventory
# Requires: pip install boto3 botocore  +  collection: amazon.aws
#
# Groups created by CDK Role tags:
#   tag_Role_haproxy  → HAProxy instance
#   tag_Role_web01    → Web01 instance
#   tag_Role_web02    → Web02 instance
#   tag_Role_db       → DB instance
#
# Usage:
#   ansible-inventory --list          # see all hosts
#   ansible-inventory --graph         # tree view
plugin: amazon.aws.aws_ec2

regions:
  - eu-central-1          # change to match your region

filters:
  instance-state-name: running
  tag:Project: lmc

# SSH mode: use public IP.  SSM mode: use instance-id (SSM identifies targets by ID).
# Switch by commenting/uncommenting the line below.
hostnames:
  - instance-id              # SSM transport (no port 22 needed)

# Create groups from the 'Role' tag
keyed_groups:
  - key: tags.Role
    prefix: tag_Role
    separator: _

# Convenience group: all web servers together
groups:
  web: "tags.Role is defined and tags.Role in ['web01', 'web02']"

compose:
  # Make private IP available as a var for use in templates
  private_ip: private_ip_address
