---

plugin: amazon.aws.aws_ec2
regions:
  - eu-central-1

filters:
  instance-state-name: running
  tag:Project: lmc

hostnames:
  - instance-id

keyed_groups:
  - key: tags.Environment
    prefix: env
  - key: tags.Name
    prefix: name
  - key: tags.Role
    prefix: role
    separator: _

groups:
  web: "tags.Role is defined and tags.Role in ['web01', 'web02']"

compose:
  private_ip: private_ip_address
  ansible_host: instance_id
  ansible_connection: "'amazon.aws.aws_ssm'"
  ansible_aws_ssm_region: "'eu-central-1'"
  ansible_aws_ssm_bucket_name: "lookup('amazon.aws.aws_ssm', '/lmc/ansible/ssm-bucket', region='eu-central-1')"
  ansible_aws_ssm_s3_addressing_style: "'virtual'"
  ansible_aws_ssm_timeout: 600
