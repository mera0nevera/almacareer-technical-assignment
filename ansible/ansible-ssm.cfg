# Alternative ansible.cfg – uses AWS SSM Session Manager as transport.
# Advantages over SSH:
#   • Port 22 is NOT required – security groups can block it completely
#   • No SSH key management
#   • Every session is logged in AWS CloudTrail + SSM Session history
#   • IAM controls who can open sessions (not SSH keys)
#
# Prerequisites:
#   pip install boto3 botocore
#   pip install ansible-collections-amazon-aws
#   brew install session-manager-plugin   # macOS
#   ansible-galaxy collection install community.aws
#
# Usage:
#   ANSIBLE_CONFIG=ansible-ssm.cfg ansible-playbook app.yaml

[defaults]
inventory         = inventory/
roles_path        = roles/
stdout_callback   = yaml
callbacks_enabled = timer

# SSM connection plugin – no SSH, no open ports
[connection]
# Override per-play with: connection: community.aws.aws_ssm

[defaults]
# Tell Ansible to use SSM for all hosts
transport = community.aws.aws_ssm
