[defaults]
inventory             = inventory/
roles_path            = roles/
host_key_checking     = False
interpreter_python    = auto_silent
stdout_callback       = yaml
forks                 = 10
timeout               = 60
retry_files_enabled   = False
gathering             = smart
fact_caching          = jsonfile
fact_caching_connection = .ansible_facts
fact_caching_timeout  = 7200
collections_path      = ./.galaxy:~/.ansible/collections

[inventory]
enable_plugins = amazon.aws.aws_ec2, yaml, ini, script, auto

[ssh_connection]
# Falls back gracefully when SSM is unavailable; does not affect aws_ssm connections.
pipelining = True
