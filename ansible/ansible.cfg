[defaults]
inventory          = inventory/
roles_path         = roles/
remote_user        = sysadmin
host_key_checking  = False

# Pretty YAML output
stdout_callback    = yaml
callbacks_enabled  = timer, profile_tasks

# Cache facts so repeated runs are faster
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = /tmp/ansible_facts_lmc
fact_caching_timeout    = 3600

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False

[ssh_connection]
# Pipelining reduces SSH connections – significant speed boost
pipelining = True
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10
