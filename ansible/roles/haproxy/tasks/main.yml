---
# Part D

- name: Install HAProxy and rsyslog
  ansible.builtin.dnf:
    name:
      - haproxy
      - rsyslog
    state: present
  tags: packages

- name: Enable and start rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
  tags: service

- name: Ensure haproxy log directory exists
  ansible.builtin.file:
    path: /var/log/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0755"
  tags: config

- name: Configure rsyslog to capture haproxy via UDP/local2
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/49-haproxy.conf
    content: |
      # Managed by Ansible
      module(load="imudp")
      input(type="imudp" port="514" address="127.0.0.1")
      local2.* /var/log/haproxy/haproxy.log
      & stop
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsyslog
  tags: config

- name: Resolve list of webservers backend members [(role, ip)] sorted by role
  ansible.builtin.set_fact:
    web_backends: "{{ web_backends | default([]) + [[hostvars[item].tags.Role, hostvars[item].private_ip]] }}"
  loop: "{{ groups['web'] | sort }}"
  tags: [config, always]

- name: Fail if no webservers were discovered
  ansible.builtin.assert:
    that:
      - web_backends | length >= 1
    fail_msg: "No webservers found. Check tags Role=web01/web02 on EC2 instances."
  tags: [config, always]

- name: Render haproxy.cfg
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -c -f %s
  notify: Reload haproxy
  tags: config

- name: Open HAProxy ports in firewalld (HTTP + stats)
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 80/tcp
    - 8404/tcp
  when: manage_firewall | bool
  tags: firewall

# - name: Allow HAProxy to bind to non-local IPs like VIP or so
#   ansible.posix.sysctl:
#     name: net.ipv4.ip_nonlocal_bind
#     value: "1"
#     sysctl_set: true
#     state: present
#     reload: true
#   tags: config

- name: Enable and start HAProxy
  ansible.builtin.service:
    name: haproxy
    state: started
    enabled: true
  tags: service
