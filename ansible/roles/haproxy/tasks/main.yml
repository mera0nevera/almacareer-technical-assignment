---
# HAProxy role – installs and configures the load balancer.

- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present
  tags: packages

- name: Ensure /run/haproxy exists for admin socket
  ansible.builtin.file:
    path: /run/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0755"
  tags: service

- name: Persist /run/haproxy across reboots via tmpfiles.d
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/haproxy.conf
    content: "d /run/haproxy 0755 haproxy haproxy -\n"
    owner: root
    group: root
    mode: "0644"
  tags: service

- name: Open HTTP port in firewall
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "80"
    - "8404"   # HAProxy stats page
  tags: firewall

- name: Deploy haproxy.cfg from template
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -c -f %s
  notify: Reload haproxy
  tags: config

- name: Enable and start HAProxy
  ansible.builtin.service:
    name: haproxy
    state: started
    enabled: true
  tags: service
