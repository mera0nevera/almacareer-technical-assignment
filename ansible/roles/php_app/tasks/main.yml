---
# Part C

- name: Ensure web root exists with correct ownership
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    owner: "{{ php_fpm_pool_user }}"
    group: "{{ php_fpm_pool_group }}"
    mode: "0755"
  tags: app_code

- name: Deploy index.php
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/index.php"
    dest: "{{ web_root }}/index.php"
    owner: "{{ php_fpm_pool_user }}"
    group: "{{ php_fpm_pool_group }}"
    mode: "0644"
  tags: app_code

- name: Deploy health.php
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/health.php"
    dest: "{{ web_root }}/health.php"
    owner: "{{ php_fpm_pool_user }}"
    group: "{{ php_fpm_pool_group }}"
    mode: "0644"
  tags: app_code

- name: Render config.php from inventory variables
  ansible.builtin.template:
    src: config.php.j2
    dest: "{{ web_root }}/config.php"
    owner: root
    group: "{{ php_fpm_pool_group }}"
    mode: "0640"
  no_log: true
  tags: app_config

# Restore SELinux labels so PHP-FPM can read the freshly copied files.
- name: Restore SELinux contexts under web root
  ansible.builtin.command: restorecon -Rv {{ web_root }}
  changed_when: false
  failed_when: false
  tags: selinux
