---
# Common role – applied to every host.
# Sets hostname, NTP, admin user, SSH hardening, firewall.

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname_short }}"
    use: systemd
  tags: hostname

- name: Install chrony (NTP)
  ansible.builtin.dnf:
    name: chrony
    state: present
  tags: ntp

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
  tags: ntp

- name: Install and enable firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present
  tags: firewall

- name: Start and enable firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  tags: firewall

- name: Allow SSH through firewall
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    state: enabled
    immediate: true
  tags: firewall
