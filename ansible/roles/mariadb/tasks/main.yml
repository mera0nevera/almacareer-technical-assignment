---
# Part B

- name: Install MariaDB and Python deps
  ansible.builtin.dnf:
    name:
      - mariadb105-server
      - mariadb105
      - python3-pip
    state: present
  tags: packages

- name: Install PyMySQL via pip (community.mysql modules need it)
  ansible.builtin.pip:
    name: PyMySQL
    state: present
    executable: pip3
  tags: packages

- name: Render MariaDB server config
  ansible.builtin.template:
    src: 50-server.cnf.j2
    dest: /etc/my.cnf.d/50-server.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mariadb
  tags: config

- name: Enable and start MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
  tags: service

- name: Drop the .my.cnf shortcut so subsequent runs auth via password
  ansible.builtin.template:
    src: root-my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"
  no_log: true
  tags: security

- name: Set MariaDB root password (works on fresh and existing installs)
  community.mysql.mysql_user:
    name: root
    host_all: true
    password: "{{ db_root_pass }}"
    check_implicit_admin: true
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    state: present
  no_log: true
  tags: security

- name: Remove anonymous MariaDB users
  community.mysql.mysql_user:
    name: ''
    host_all: true
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    state: absent
  no_log: true
  tags: security

- name: Remove the default test database
  community.mysql.mysql_db:
    name: test
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    state: absent
  no_log: true
  tags: security

- name: Create application database
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    state: present
  tags: schema

- name: Resolve list of web private IPs allowed to talk to MySQL
  ansible.builtin.set_fact:
    web_private_ips: "{{ groups['web'] | map('extract', hostvars, 'private_ip') | list }}"
  tags: [schema, firewall]

- name: Fail if no web hosts were discovered (inventory broken or empty)
  ansible.builtin.assert:
    that:
      - web_private_ips | length > 0
    fail_msg: "No hosts found in group 'web'. Check tags Role=web01/web02 and the aws_ec2 inventory plugin."
  tags: [schema, firewall]

- name: Create application user, scoped to each web private IP
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    host: "{{ item }}"
    password: "{{ db_pass }}"
    priv: "{{ db_name }}.*:ALL"
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    state: present
  loop: "{{ web_private_ips }}"
  no_log: true
  tags: schema

- name: Create application schema (users + visits)
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ db_root_pass }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    login_db: "{{ db_name }}"
    query:
      - |
        CREATE TABLE IF NOT EXISTS users (
          id         INT AUTO_INCREMENT PRIMARY KEY,
          username   VARCHAR(100) NOT NULL,
          email      VARCHAR(200) NOT NULL UNIQUE,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4
      - |
        CREATE TABLE IF NOT EXISTS visits (
          id              INT AUTO_INCREMENT PRIMARY KEY,
          server_hostname VARCHAR(200) NOT NULL,
          visited_at      TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
          INDEX idx_server (server_hostname),
          INDEX idx_time   (visited_at)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4
      - |
        INSERT IGNORE INTO users (username, email)
        VALUES ('admin', 'admin@example.com'), ('testuser', 'test@example.com')
  tags: schema

# ── Firewall ────────────────────────────────────────────────────────────────
- name: Open MySQL port only from web private IPs
  ansible.posix.firewalld:
    rich_rule: "rule family='ipv4' source address='{{ item }}/32' port port='3306' protocol='tcp' accept"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ web_private_ips }}"
  when: manage_firewall | bool
  tags: firewall
