---

- name: Common baseline on all hosts
  hosts: all
  roles:
    - common

- name: HAProxy load balancer
  hosts: tag_Role_haproxy
  roles:
    - haproxy

- name: Web servers (Nginx + PHP-FPM + app)
  hosts: web
  roles:
    - nginx
    - php_app

- name: Database server
  hosts: tag_Role_db
  vars_files:
    - inventory/group_vars/web.yml    # db_name, db_user, db_pass
  vars:
    db_root_pass: "{{ db_pass }}_root"
  roles:
    - mariadb
