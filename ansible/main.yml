---

- name: A — Common baseline on every host
  hosts: all
  gather_facts: true
  become: true
  become_method: sudo
  roles:
    - common

- name: B — Database
  hosts: role_db
  gather_facts: true
  become: true
  become_method: sudo
  vars_files:
    - inventory/group_vars/web.yml
  roles:
    - mariadb

- name: C — Web servers (Nginx + PHP-FPM + LMC app)
  hosts: web
  gather_facts: true
  become: true
  become_method: sudo
  serial: 1   # never break both web servers at once
  roles:
    - nginx
    - php_app

- name: D — HAProxy load balancer
  hosts: role_haproxy
  gather_facts: true
  become: true
  become_method: sudo
  roles:
    - haproxy
